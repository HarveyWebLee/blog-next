name: Deploy

on:
  push:
    branches:
      - main

# 避免同一分支多次推送导致并发部署互相覆盖：
# 新部署到来时采用排队执行，避免拉取/构建镜像进行到一半被中断。
# 部署问题记录（已踩坑）：
# 1) 远程构建期间 SSH 链路偶发中断（Broken pipe）-> 增加 keepalive 参数。
# 2) db-migrate 在 SSH heredoc 场景可能“看似完成但不返回”-> run 时断开 stdin（< /dev/null）。
# 3) 仅看“迁移成功”无法判断整体部署完成 -> 增加阶段标记、容器运行态校验与日志输出。
# 4) db-migrate 若未重新 build 镜像，会沿用旧 COPY 的 drizzle/ -> 流水线先 compose build db-migrate，再 compose run（无 --build）。
# 5) timeout 直接 exec 子进程，不解析 shell 函数：`timeout … dc …` 会找可执行文件 dc 而失败；须 `timeout … bash -c 'docker compose …'`。
# 6) `bash -c` 子进程只继承已 export 的变量；COMPOSE_FILE/COMPOSE_ENV 必须 export，否则 -f/--env-file 为空并报错。
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 部署步骤含远端两次 Docker 构建（db-migrate、blog-web）与迁移，弱网/无 BuildKit 缓存时可能较长。
    # 与下方 db-migrate 分步超时对齐，避免 Actions 整 job 先被杀死。
    timeout-minutes: 120
    env:
      # 目标服务器中的项目目录。
      # 如需修改部署目录，只需改这里即可。
      APP_DIR: /opt/blog-next
    steps:
      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 将仓库 Secret 中的私钥写入 runner，供后续 SSH 使用。
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 预先写入主机指纹，避免首次连接交互确认。
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh \
            -p "${{ secrets.SERVER_PORT }}" \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "APP_DIR='${APP_DIR}' bash -s" << 'EOF'
            set -euo pipefail

            # Git 2.35+ 安全机制：当仓库目录 owner 与当前用户不一致时会拒绝操作。
            # 在 CI 远程部署场景下，将部署目录加入 safe.directory，避免 pull/fetch 失败。
            git config --global --add safe.directory "${APP_DIR}"

            cd "${APP_DIR}"
            # timeout … bash -c '…' 为子进程，未 export 的变量在子 shell 中为空，会导致 -f 异常（如报「xxx is a directory」）
            export COMPOSE_FILE="${APP_DIR}/docker-compose.yml"
            export COMPOSE_ENV="${APP_DIR}/deploy/.env.docker"
            # Docker/Compose 在 build 过程中会在 /tmp 写临时 metadata 文件；
            # 当 /tmp 所在分区空间不足时，会出现「no space left on device」并导致部署失败。
            # 这里将临时目录切到项目目录下可控位置，降低 /tmp 分区容量抖动的影响。
            export TMPDIR="${APP_DIR}/.tmp"
            mkdir -p "${TMPDIR}"
            APP_HEALTH_URL="http://127.0.0.1:13001/"
            dc() { docker compose -f "${COMPOSE_FILE}" --env-file "${COMPOSE_ENV}" "$@"; }
            echo "[DEPLOY] init: cwd=${APP_DIR}"

            # 0) 构建前磁盘守护：先检测可用空间，不足时执行一次温和清理（仅清理悬挂/未使用资源）
            # 目标：避免 docker compose build 在导出层或写 metadata 时因磁盘耗尽失败。
            echo "[DEPLOY] step0: disk precheck"
            MIN_AVAIL_KB=4194304  # 4GB
            get_avail_kb() { df -Pk "${APP_DIR}" | awk 'NR==2 {print $4}'; }
            avail_kb="$(get_avail_kb)"
            echo "[DEPLOY] available disk before cleanup: ${avail_kb} KB"
            if [ "${avail_kb}" -lt "${MIN_AVAIL_KB}" ]; then
              echo "[DEPLOY] low disk space, run docker system prune -f"
              docker system prune -f || true
              avail_kb="$(get_avail_kb)"
              echo "[DEPLOY] available disk after cleanup: ${avail_kb} KB"
              if [ "${avail_kb}" -lt "${MIN_AVAIL_KB}" ]; then
                echo "部署失败：服务器剩余磁盘不足（<4GB），且自动清理后仍不足。请先扩容或手动清理磁盘。" >&2
                df -h
                exit 1
              fi
            fi
            echo "[DEPLOY] step0 done"

            # 确保启用 BuildKit，使 Dockerfile.migrate 中 pnpm store 的 RUN --mount=type=cache 生效；
            # 否则每次构建常见 reused:0、全量下载，极易触发迁移步骤超时。
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            # 始终对齐远端 main，确保部署内容可追踪、可复现。
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            echo "[DEPLOY] git sync done"

            # 1) 先确保依赖服务在线（若已在线会保持不变；MinIO 数据在 MINIO_HOST_DATA_DIR 绑定目录，默认仓库下 data/minio）
            echo "[DEPLOY] step1: ensure mysql/redis/minio running"
            dc up -d mysql redis minio
            echo "[DEPLOY] step1 done"

            # 1b) MinIO：创建公开读 bucket（幂等；每次部署执行安全）
            echo "[DEPLOY] step1b: minio-init (idempotent)"
            if ! timeout 120 docker compose -f "${COMPOSE_FILE}" --env-file "${COMPOSE_ENV}" --profile minio-init run --rm -T minio-init < /dev/null; then
              echo "部署失败：MinIO 初始化（minio-init）未成功" >&2
              dc logs --tail=80 minio || true
              exit 1
            fi
            echo "[DEPLOY] step1b done"

            # 2) 数据库迁移：拆成「仅构建镜像」与「仅运行容器」，避免 run --build 共用一条短超时。
            # 构建阶段含 pnpm install，弱网/无 store 缓存时可能远长于 drizzle-kit migrate 本身。
            BUILD_DB_MIGRATE_TIMEOUT_SEC=3600
            echo "[DEPLOY] step2a: build db-migrate image (timeout ${BUILD_DB_MIGRATE_TIMEOUT_SEC}s)"
            set +e
            timeout "${BUILD_DB_MIGRATE_TIMEOUT_SEC}" bash -c 'docker compose -f "${COMPOSE_FILE}" --env-file "${COMPOSE_ENV}" --profile migrate build db-migrate'
            build_exit_code=$?
            set -e
            if [ "${build_exit_code}" -ne 0 ]; then
              echo "[DEPLOY] step2a build exit code: ${build_exit_code}"
              if [ "${build_exit_code}" -eq 124 ]; then
                echo "部署失败：db-migrate 镜像构建超时（超过 ${BUILD_DB_MIGRATE_TIMEOUT_SEC} 秒；多为 pnpm install）" >&2
              else
                echo "部署失败：db-migrate 镜像构建失败（退出码 ${build_exit_code}）" >&2
              fi
              exit "${build_exit_code}"
            fi
            echo "[DEPLOY] step2a done"

            MIGRATE_RUN_TIMEOUT_SEC=600
            echo "[DEPLOY] step2b: run db migrations (timeout ${MIGRATE_RUN_TIMEOUT_SEC}s)"
            set +e
            timeout "${MIGRATE_RUN_TIMEOUT_SEC}" bash -c 'docker compose -f "${COMPOSE_FILE}" --env-file "${COMPOSE_ENV}" --profile migrate run --rm -T --no-deps db-migrate' < /dev/null
            migrate_exit_code=$?
            set -e
            if [ "${migrate_exit_code}" -ne 0 ]; then
              echo "[DEPLOY] step2b migrate exit code: ${migrate_exit_code}"
              if [ "${migrate_exit_code}" -eq 124 ]; then
                echo "部署失败：数据库迁移命令超时（超过 ${MIGRATE_RUN_TIMEOUT_SEC} 秒；镜像已构建，多为连库慢或迁移挂起）" >&2
              else
                echo "部署失败：数据库迁移执行异常（退出码 ${migrate_exit_code}）" >&2
              fi
              dc --profile migrate logs --tail=100 db-migrate || true
              exit "${migrate_exit_code}"
            fi
            echo "[DEPLOY] step2b migrate exit code: ${migrate_exit_code}"
            echo "[DEPLOY] step2 done"

            # 3) 构建并更新应用容器
            echo "[DEPLOY] step3: build and start blog-web"
            dc up -d --build blog-web
            echo "[DEPLOY] step3 done"

            # 4) 打印当前服务状态，便于在 GitHub Actions 日志中直接确认部署结果
            echo "[DEPLOY] step4: print compose status"
            dc ps
            echo "[DEPLOY] step4 done"

            # 5) 健康校验：确保 blog-web 容器存在且处于运行态，否则让流水线失败
            echo "[DEPLOY] step5: verify blog-web running"
            cid="$(dc ps -q blog-web)"
            if [ -z "${cid}" ]; then
              echo "部署失败：blog-web 容器不存在" >&2
              dc logs --tail=100 blog-web || true
              exit 1
            fi

            if [ "$(docker inspect -f '{{.State.Running}}' "${cid}" 2>/dev/null || echo false)" != "true" ]; then
              echo "部署失败：blog-web 容器未处于运行状态" >&2
              docker logs --tail=100 "${cid}" || true
              exit 1
            fi
            echo "[DEPLOY] step5 done"

            # 6) 应用探活：确认 HTTP 可访问，避免“容器已运行但服务未就绪”
            echo "[DEPLOY] step6: probe app health (${APP_HEALTH_URL})"
            if ! curl -fsS --max-time 10 "${APP_HEALTH_URL}" > /dev/null; then
              echo "部署失败：应用 HTTP 探活未通过（${APP_HEALTH_URL}）" >&2
              docker logs --tail=100 "${cid}" || true
              exit 1
            fi
            echo "[DEPLOY] step6 done"
            echo "[DEPLOY] all steps completed"
          EOF
