name: Deploy

on:
  push:
    branches:
      - main

# 避免同一分支多次推送导致并发部署互相覆盖：
# 新部署到来时采用排队执行，避免拉取/构建镜像进行到一半被中断。
# 部署问题记录（已踩坑）：
# 1) 远程构建期间 SSH 链路偶发中断（Broken pipe）-> 增加 keepalive 参数。
# 2) db-migrate 在 SSH heredoc 场景可能“看似完成但不返回”-> run 时断开 stdin（< /dev/null）。
# 3) 仅看“迁移成功”无法判断整体部署完成 -> 增加阶段标记、容器运行态校验与日志输出。
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 部署步骤包含远程拉取镜像、构建与迁移，网络慢时可能超过 30 分钟。
    # 适当放宽超时，避免正常部署被误判为超时。
    timeout-minutes: 60
    env:
      # 目标服务器中的项目目录。
      # 如需修改部署目录，只需改这里即可。
      APP_DIR: /opt/blog-next
    steps:
      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 将仓库 Secret 中的私钥写入 runner，供后续 SSH 使用。
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 预先写入主机指纹，避免首次连接交互确认。
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh \
            -p "${{ secrets.SERVER_PORT }}" \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "APP_DIR='${APP_DIR}' bash -s" << 'EOF'
            set -euo pipefail

            # Git 2.35+ 安全机制：当仓库目录 owner 与当前用户不一致时会拒绝操作。
            # 在 CI 远程部署场景下，将部署目录加入 safe.directory，避免 pull/fetch 失败。
            git config --global --add safe.directory "${APP_DIR}"

            cd "${APP_DIR}"
            COMPOSE_FILE="${APP_DIR}/docker-compose.yml"
            COMPOSE_ENV="${APP_DIR}/deploy/.env.docker"
            APP_HEALTH_URL="http://127.0.0.1:13001/"
            dc() { docker compose -f "${COMPOSE_FILE}" --env-file "${COMPOSE_ENV}" "$@"; }
            echo "[DEPLOY] init: cwd=${APP_DIR}"

            # 始终对齐远端 main，确保部署内容可追踪、可复现。
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            echo "[DEPLOY] git sync done"

            # 1) 先确保依赖服务在线（若已在线会保持不变）
            echo "[DEPLOY] step1: ensure mysql/redis running"
            dc up -d mysql redis
            echo "[DEPLOY] step1 done"

            # 2) 运行数据库迁移（幂等）
            echo "[DEPLOY] step2: run db migrations"
            if timeout 300 dc --profile migrate run --rm -T --no-deps db-migrate < /dev/null; then
              echo "[DEPLOY] step2 migrate exit code: 0"
            else
              migrate_exit_code=$?
              echo "[DEPLOY] step2 migrate exit code: ${migrate_exit_code}"
              if [ "${migrate_exit_code}" -eq 124 ]; then
                echo "部署失败：数据库迁移步骤超时（超过 300 秒）" >&2
              else
                echo "部署失败：数据库迁移步骤执行异常（退出码 ${migrate_exit_code}）" >&2
              fi
              dc --profile migrate logs --tail=100 db-migrate || true
              exit "${migrate_exit_code}"
            fi
            echo "[DEPLOY] step2 done"

            # 3) 构建并更新应用容器
            echo "[DEPLOY] step3: build and start blog-web"
            dc up -d --build blog-web
            echo "[DEPLOY] step3 done"

            # 4) 打印当前服务状态，便于在 GitHub Actions 日志中直接确认部署结果
            echo "[DEPLOY] step4: print compose status"
            dc ps
            echo "[DEPLOY] step4 done"

            # 5) 健康校验：确保 blog-web 容器存在且处于运行态，否则让流水线失败
            echo "[DEPLOY] step5: verify blog-web running"
            cid="$(dc ps -q blog-web)"
            if [ -z "${cid}" ]; then
              echo "部署失败：blog-web 容器不存在" >&2
              dc logs --tail=100 blog-web || true
              exit 1
            fi

            if [ "$(docker inspect -f '{{.State.Running}}' "${cid}" 2>/dev/null || echo false)" != "true" ]; then
              echo "部署失败：blog-web 容器未处于运行状态" >&2
              docker logs --tail=100 "${cid}" || true
              exit 1
            fi
            echo "[DEPLOY] step5 done"

            # 6) 应用探活：确认 HTTP 可访问，避免“容器已运行但服务未就绪”
            echo "[DEPLOY] step6: probe app health (${APP_HEALTH_URL})"
            if ! curl -fsS --max-time 10 "${APP_HEALTH_URL}" > /dev/null; then
              echo "部署失败：应用 HTTP 探活未通过（${APP_HEALTH_URL}）" >&2
              docker logs --tail=100 "${cid}" || true
              exit 1
            fi
            echo "[DEPLOY] step6 done"
            echo "[DEPLOY] all steps completed"
          EOF
