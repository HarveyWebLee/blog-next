name: Deploy

on:
  push:
    branches:
      - main

# 避免同一分支多次推送导致并发部署互相覆盖：
# 新部署到来时采用排队执行，避免拉取/构建镜像进行到一半被中断。
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 部署步骤包含远程拉取镜像、构建与迁移，网络慢时可能超过 30 分钟。
    # 适当放宽超时，避免正常部署被误判为超时。
    timeout-minutes: 60
    env:
      # 目标服务器中的项目目录。
      # 如需修改部署目录，只需改这里即可。
      APP_DIR: /opt/blog-next
    steps:
      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 将仓库 Secret 中的私钥写入 runner，供后续 SSH 使用。
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 预先写入主机指纹，避免首次连接交互确认。
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "APP_DIR='${APP_DIR}' bash -s" << 'EOF'
            set -euo pipefail

            # Git 2.35+ 安全机制：当仓库目录 owner 与当前用户不一致时会拒绝操作。
            # 在 CI 远程部署场景下，将部署目录加入 safe.directory，避免 pull/fetch 失败。
            git config --global --add safe.directory "${APP_DIR}"

            cd "${APP_DIR}"

            # 始终对齐远端 main，确保部署内容可追踪、可复现。
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # 1) 先确保依赖服务在线（若已在线会保持不变）
            docker compose --env-file deploy/.env.docker up -d mysql redis

            # 2) 运行数据库迁移（幂等）
            docker compose --env-file deploy/.env.docker --profile migrate run --rm db-migrate

            # 3) 构建并更新应用容器
            docker compose --env-file deploy/.env.docker up -d --build blog-web
          EOF
