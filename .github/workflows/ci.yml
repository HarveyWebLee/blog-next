name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  api-docs-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate api-docs manifest
        run: pnpm api-docs:generate

      - name: Validate api-docs manifest consistency
        run: pnpm api-docs:check
