# 推送到 main 且存在可发布提交（feat / fix / perf 等）时，由 semantic-release
# 提升 package.json version、更新 CHANGELOG.md、创建 GitHub Release 并打 tag。
# Release 产生的提交信息中带 [skip ci]，避免无意义重复跑本工作流。
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release 需要完整提交历史以计算自上次 tag 以来的变更
          fetch-depth: 0
          persist-credentials: true

      # 不在此写 version：与 package.json 的 packageManager（pnpm@9.0.0）双写会触发
      # pnpm/action-setup「Multiple versions」错误；由 action 从 packageManager 字段解析版本。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # HUSKY=0：发布机器人 git commit 不跑 husky（与 release.config 内 exec+Prettier 双保险）
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"
        run: pnpm exec semantic-release
