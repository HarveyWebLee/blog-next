# 荒野博客：MySQL + Redis + Next.js（生产向编排）
#
# 本地推荐（与 package.json 一致）：
#   pnpm docker:up:deps  — 启动 MySQL / Redis / MinIO（本机 MySQL 即 blog-mysql 容器）
#   pnpm docker:migrate  — 仅在 compose 网络内对 MySQL 跑 Drizzle 迁移（db-migrate 容器；DB_HOST=mysql）
#
# 准备：cp deploy/env.docker.example deploy/.env.docker 并修改密钥
# 启动基础设施：docker compose --env-file deploy/.env.docker up -d mysql redis minio
# MinIO 首次创建公开读 bucket（幂等）：docker compose --env-file deploy/.env.docker --profile minio-init run --rm minio-init
# 执行迁移（建议加 --build，避免沿用旧镜像内 drizzle/）：docker compose --env-file deploy/.env.docker --profile migrate run --rm --build db-migrate
# 启动应用：docker compose --env-file deploy/.env.docker up -d blog-web
# 对外 HTTPS（可选）：先准备 deploy/secrets/edge/（可从 deploy/secrets/edge.example 复制），并在 deploy/.env.docker 设置 EDGE_SECRETS_DIR=./deploy/secrets/edge
# docker compose --env-file deploy/.env.docker --profile edge up -d --build blog-edge
#
# 流水线建议顺序：build 镜像 → up mysql/redis → migrate → up blog-web →（若存在 edge secrets）up blog-edge

name: blog-next

services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    env_file:
      - deploy/.env.docker
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 deploy/.env.docker 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blog_system}
    ports:
      - "${MYSQL_PUBLISH_PORT:-13307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - blog-net

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    # 生产环境启用 requirepass，避免未授权访问 Redis。
    # 密码通过 deploy/.env.docker 的 REDIS_PASSWORD 注入。
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?请在 deploy/.env.docker 中设置 REDIS_PASSWORD}
    ports:
      - "${REDIS_PUBLISH_PORT:-16380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      # 开启 requirepass 后，健康检查也需携带密码。
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?请在 deploy/.env.docker 中设置 REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - blog-net

  # S3 兼容对象存储：文章封面/插图等。
  # 数据目录：通过 deploy/.env.docker 的 MINIO_HOST_DATA_DIR 绑定到宿主机（默认 ./data/minio，见模板注释）。
  # 相对路径相对于本 compose 文件所在目录（仓库根），与执行 docker compose 时 shell 的 cd 无关。
  # Linux 若无法写入，多为宿主机目录权限与容器内 MinIO 用户 UID 不一致。
  minio:
    image: minio/minio:latest
    container_name: blog-minio
    restart: unless-stopped
    env_file:
      - deploy/.env.docker
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?请在 deploy/.env.docker 中设置 MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?请在 deploy/.env.docker 中设置 MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PUBLISH_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PUBLISH_PORT:-19001}:9001"
    volumes:
      - type: bind
        source: ${MINIO_HOST_DATA_DIR:-./data/minio}
        target: /data
    healthcheck:
      # 官方镜像内含 curl；用于 blog-web 将来 depends_on 与 init 任务顺序。
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - blog-net

  # 使用 mc 创建 bucket 并设为匿名可下载（仅 GetObject，适合公开文章配图）。随部署重复执行亦幂等。
  minio-init:
    image: minio/mc:latest
    container_name: blog-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - deploy/.env.docker
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?请在 Compose 环境文件中设置 MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?请在 Compose 环境文件中设置 MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-blog-public}
    networks:
      - blog-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -euo pipefail
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb "local/$$MINIO_BUCKET" --ignore-existing
        mc anonymous set download "local/$$MINIO_BUCKET"
    profiles:
      - minio-init

  # 一次性迁移任务（不随 up -d 默认启动，需 --profile migrate）
  # 连接信息：env_file 读 deploy/.env.docker 的 DB_USER/DB_PASSWORD/DB_NAME 等；DB_HOST 固定为 mysql（勿在模板里写 localhost）
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    env_file:
      - deploy/.env.docker
    environment:
      # 覆盖 env 模板里可能出现的 localhost，指向 compose 服务名
      DB_HOST: mysql
      DB_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog-net
    profiles:
      - migrate

  blog-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MINIO_BUCKET: ${MINIO_BUCKET:-blog-public}
        NEXT_PUBLIC_MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://127.0.0.1:19000}
    image: blog-next-web:local
    container_name: blog-next-app
    restart: unless-stopped
    env_file:
      - deploy/.env.docker
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: "3306"
      # 支持从 deploy/.env.docker 自定义 REDIS_URL；
      # 若未显式提供，则按约定拼装为带密码的容器内地址。
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:?请在 deploy/.env.docker 中设置 REDIS_PASSWORD}@redis:6379}
      # MinIO：应用容器内走服务名；其余 MINIO_* / NEXT_PUBLIC_* 由 env_file 提供
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "${APP_PORT:-13001}:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blog-net

  # Nginx + certbot：TLS 终结、反代 blog-web、/blog-resource/ 反代 MinIO；仅随 --profile edge 启动。
  # Secret 单行文件路径由 EDGE_SECRETS_DIR 控制（默认指向仓库内 edge.example，便于本地 compose 校验；生产勿用示例邮箱申请证书）。
  blog-edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
      args:
        # 默认使用国内 Alpine 镜像，加速 certbot 相关依赖安装。
        ALPINE_MIRROR: ${ALPINE_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/alpine}
    image: blog-next-edge:local
    container_name: blog-next-edge
    restart: unless-stopped
    profiles:
      - edge
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    depends_on:
      blog-web:
        condition: service_started
    networks:
      - blog-net
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    environment:
      DOMAINS_FILE: /run/secrets/edge_domains
      CERTBOT_EMAIL_FILE: /run/secrets/edge_certbot_email
      APP_UPSTREAM_FILE: /run/secrets/edge_app_upstream
      CHECK_INTERVAL_SECONDS_FILE: /run/secrets/edge_check_interval_seconds
      RENEW_STRATEGY_FILE: /run/secrets/edge_renew_strategy
      OFFICIAL_RENEW_WINDOW_SECONDS_FILE: /run/secrets/edge_official_renew_window_seconds
      RENEW_BEFORE_SECONDS_FILE: /run/secrets/edge_renew_before_seconds
      TLS_MODE_FILE: /run/secrets/edge_tls_mode
    secrets:
      - edge_domains
      - edge_certbot_email
      - edge_app_upstream
      - edge_check_interval_seconds
      - edge_renew_strategy
      - edge_official_renew_window_seconds
      - edge_renew_before_seconds
      - edge_tls_mode

volumes:
  mysql_data:
  redis_data:
  letsencrypt_data:
  certbot_webroot:

networks:
  blog-net:
    driver: bridge

secrets:
  edge_domains:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/domains
  edge_certbot_email:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/certbot_email
  edge_app_upstream:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/app_upstream
  edge_check_interval_seconds:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/check_interval_seconds
  edge_renew_strategy:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/renew_strategy
  edge_official_renew_window_seconds:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/official_renew_window_seconds
  edge_renew_before_seconds:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/renew_before_seconds
  edge_tls_mode:
    file: ${EDGE_SECRETS_DIR:-./deploy/secrets/edge.example}/tls_mode
