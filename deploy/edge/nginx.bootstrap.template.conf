server {
    listen 80;
    server_name ${DOMAINS_SPACED};

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # ACME 验证目录：用于 certbot HTTP-01 挑战
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 健康检查（Compose healthcheck / cert-manager 等待 Nginx 就绪）
    location = /.well-known/acme-challenge/health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # MinIO 公开对象：与 blog-next 约定路径前缀一致（见应用与 MinIO 文档）
    location ^~ /blog-resource/ {
        proxy_pass http://minio:9000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 证书签发前后均保持 HTTP 反代可用（申请失败时不中断业务）
    location / {
        proxy_pass ${APP_UPSTREAM};

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
